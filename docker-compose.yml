version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: urlshortener-app

    env_file:
      - .env

    ports:
      - "8080:8080"

    volumes:
      - ./data:/app/data

    depends_on:
      - redis

    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: urlshortener-redis

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    restart: unless-stopped

volumes:
  redis_data: